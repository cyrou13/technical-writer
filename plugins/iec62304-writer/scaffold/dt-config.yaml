# Dossier Technique export configuration.
#
# Read by `/doc-export` to produce the customer-facing SRS deliverable
# (Markdown + optional .docx) and by all writers to compute item IDs.
#
# This file is generated by `/doc-init` and edited by hand. It is
# NOT regenerated by any agent — it captures the QMS-side metadata
# (signatures, references, revision history) that does not belong in
# code.

# -----------------------------------------------------------------------------
# Document identification
# -----------------------------------------------------------------------------
document:
  identifier: AV-DP-XXX-10-006-SRS      # document number in your QMS
  title: Software Requirements Specification — [PRODUCT NAME]
  short_name: PRODUCT-NAME              # used in default reference labels
  version_label: V01                    # released version of THIS document
  date: YYYY-MM-DD                      # release date of the current version

# -----------------------------------------------------------------------------
# Product metadata (also used to build item IDs)
# -----------------------------------------------------------------------------
product:
  suite: SUITE                          # e.g. CINA
  application: APP                      # e.g. CSP

# -----------------------------------------------------------------------------
# ID format — controls how new item IDs are minted by writers.
#
# Available variables:
#   {CAT}      — category prefix (SRS, SDS, TC, RSK, THR, USC, URSK, MAP)
#   {SUITE}    — product.suite from above
#   {APP}      — product.application from above
#   {DOMAIN}   — short uppercase domain (e.g. AUTH, ACQ, CAD), chosen by the writer
#   {NNN:03d}  — zero-padded counter (per CAT × DOMAIN)
#
# `default` applies to every category unless overridden by a per-category key.
# Existing items keep their original IDs — format changes only affect NEW IDs.
# -----------------------------------------------------------------------------
id_format:
  default: "{CAT}-{DOMAIN}-{NNN:03d}"
  # Avicenna-style 5-segment IDs:
  # default: "{CAT}-{SUITE}-{APP}-{DOMAIN}-{NNN:03d}"
  #
  # Per-category overrides (uncomment as needed):
  # MAP: "{SUITE}-V{VERSION}-{NNN:03d}"

# -----------------------------------------------------------------------------
# Signatories — appear on the cover page of the export
# -----------------------------------------------------------------------------
approvals:
  written_by:
    name: "[TODO]"
    role: "[TODO Project Manager / R&D Engineer / ...]"
  verified_by:
    name: "[TODO]"
    role: "[TODO R&D Manager / ...]"
  approved_by:
    name: "[TODO]"
    role: "[TODO Regulatory Manager / Quality Manager / ...]"

# -----------------------------------------------------------------------------
# Revision history — list every released version of this document.
# Versions of individual items are tracked separately in their frontmatter.
# -----------------------------------------------------------------------------
revision_history:
  - version: V01
    date: YYYY-MM-DD
    parts: All
    reason: Initial creation.

# -----------------------------------------------------------------------------
# Project references — cross-document pointers used in §1.3 of the SRS.
# `id` is the local label used inline (e.g. "[R1]"), `identifier` is the
# external document number, `title` is the human-readable name.
# -----------------------------------------------------------------------------
project_references:
  - id: R1
    identifier: AV-DP-XXX-10-005-RAS
    title: Risk Analysis.
  - id: R2
    identifier: AV-DP-XXX-10-008-STP
    title: Software Test Plan.
  - id: R3
    identifier: AV-DP-XXX-10-000-PMAP
    title: Projects Master Plan.

# -----------------------------------------------------------------------------
# Rendering options (optional)
# -----------------------------------------------------------------------------
# -----------------------------------------------------------------------------
# External resources — optional pointers to QMS-managed files that should be
# inlined into the deliverables instead of the inline `dt-clinical-context.md`
# section or a [TODO] yellow marker.
#
# Each entry maps a narrative anchor → path (relative to repo root). The path
# can point to a .md file produced/maintained outside this repo (Obsidian
# vault, QMS export, etc.).
#
# Resolution order at export time:
#   1. external_resources[<anchor>] exists AND file is readable → inline it
#   2. docs/dt-clinical-context.md has a `## <anchor>` section → inline it
#   3. Neither → yellow-highlighted [TODO] marker with author-facing hint
#
# Available anchors (consumed by /doc-export, /doc-risk-export, /doc-sdd-export,
# /doc-stp-export, /doc-stdr-export, /doc-str-export):
#   document-overview, abbreviations, glossary, intended-use,
#   warnings-and-precautions, connected-devices, personnel-and-training,
#   packaging, end-users, characteristics-affecting-safety,
#   general-system-architecture, hardware-and-software-requirements,
#   processing-workflow, application-workflow, error-code-standardization,
#   class-diagram, cots-control, test-environment-overview,
#   tests-identification-strategy, tests-schedule, qualification,
#   test-preparation-data, test-preparation-environment, test-preparation-tools,
#   automated-tests-platform, local-tests-platforms, rationale-for-decisions
# -----------------------------------------------------------------------------
external_resources: {}
  # Example — point at a QMS-managed Obsidian note for the system architecture:
  # general-system-architecture: docs/qms/system-architecture.md
  # class-diagram: docs/qms/diagrams/class-diagram.md

rendering:
  # If set and pandoc is installed, /doc-export produces a .docx alongside
  # the .md. Path is relative to the repo root.
  reference_docx: null                  # e.g. "dt-template.docx"

  # If true, the export inlines the full text of `docs/dt-clinical-context.md`
  # in §1 and §2.1. Disable only if you handle framing sections in a separate
  # post-processing step.
  inline_clinical_context: true

# Path to the CI test results file (optional)
# Format spec: see `tools/build_stdr_export.py` docstring or test-results.example.json
# Statuses: passed | failed | skipped | not_run | manual_passed | manual_failed
test_results_path: test-results.json
